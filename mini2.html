<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">

    <div
        style="display: flex; flex-direction: row; justify-content: space-between; max-width: 1400px; width: 100%; margin: 0 auto;">

        <div>
            <img width="100" height="100" src="https://dev.rmahousing.com/assets/images/RMALogo1.png" alt="">
        </div>

        <div style="display: flex; flex-direction: row; justify-content: center; align-items: center; gap : 20px;">
            <h5>Home</h5>
            <h5>Find a Home</h5>
            <h5>Our Difference</h5>
            <h5>Pricing</h5>
            <h5>Resources</h5>
            <h5>Contact</h5>
        </div>


        <div style="display: flex; flex-direction: row; justify-content: center; align-items: center; gap : 20px;">
            <button
                style="height: 40px; width: 120px; border-radius: 999px; border:none; background-color: #8e2157; color: white">Sign
                Up</button>
            <button
                style="height: 40px; width: 120px; border-radius: 999px; border:none; background-color: #8e2157; color: white">Sign
                In</button>
        </div>


    </div>


    <div>

        <div
            style="margin-top: 200px; background-color: white; max-width: 900px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px;">
            <input type="text" style="height: 40px; width: 90%; border-radius: 999px;"
                placeholder="Search for your property">

            <div style="display: flex; flex-direction: row; width: 100%; margin-right: 20px; justify-content: space-between; align-items: center;">
                <div style=" margin-left: 20px;">
                    <h3>Find out your next happy home instantly</h3>
                    <p>Explore properties that match your lifestyle and find the perfect place to call home.</p>
                </div>

                <div>
                    <button style="background-color: #8e2157; height: 50px; width: 120px;  color: white; border-radius: 999px; border: none;">Search Properties</button>
                </div>
            </div>
        </div>
        <img style="position: absolute; left: 0px; top: 0px; z-index: -1; background-position: center; width: 100%;"
            src="https://images.pexels.com/photos/37134234/pexels-photo-37134234.jpeg" alt="">
    </div>

</body>

</html>
