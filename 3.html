<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="internal-styles.css">

<body

    <div class="input-group">
        <label for="email">Email</label>
        <input class="input-style" type="email" id="email" name="email" placeholder="Enter your email" />

    <div class="input-group">
        <label for="password">Password</label>

        <input class="input-style" type="password" id="password" name="password" placeholder="Enter your password" />

        <input class="input-style" type="firstName" id="firstName" name="firstName" placeholder="Enter your first Name" />
