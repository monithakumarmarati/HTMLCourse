<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    
</head>

<body
    style="width: 100%; min-height:100vh; display: flex; flex-direction: column; justify-content: start; align-items: center;">

    <div style="width: 100%; text-align: center;">
        <h1>Types of Inputs in HTML</h1>
        <h2>Instagram Registration Page Design</h2>
    </div>

    <div style="display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px;">
        <label for="email">Email</label>
        <input type="email" style="height: 25px; width: 300px; border-radius: 12px;">
    </div>

    <div style="display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px;">
        <label for="">Password</label>
        <input type="password" style="height: 25px; width: 300px; border-radius: 12px;">
    </div>

    <div style="display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px;">
        <label for="primaryAddress">Primary Address</label>
        <textarea name="" id="" cols="30" rows="10" style="width: 300px; border-radius: 12px;"></textarea>
    </div>

    <div style="display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px;">
        <label for="country">Country</label>
        <select name="" id="" style="width: 300px; height: 30px; border-radius: 12px;">
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="japan">Japan</option>
        </select>
    </div>

    <div style="display: flex; flex-direction: row; gap: 4px; margin-bottom: 15px; width: 300px;">
        <label for="">Gender</label>
        <input type="radio">Male
        <input type="radio">Female
    </div>

    <div style="display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px;">
        <label for="dateofbirth">Date of Birth</label>
        <input type="date" style="width: 300px; height: 25px; border-radius: 12px;">
    </div>

    <div style="display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px;">
        <label for="timeofbirth">Time of Birth</label>
        <input type="time" style="width: 300px; height: 25px; border-radius: 12px;">
    </div>

    <div style="display: flex; flex-direction: row; gap: 4px; margin-bottom: 15px; width: 300px;">
        <input type="checkbox">
        <label for="terms">I agree to Terms & Conditions</label>
    </div>

    <div style="margin-bottom: 15px; width: 300px;">
        <p>People who use our service may have uploaded your contact information to Instagram. <span style="color: #2563eb; font-weight: 600;">Learn More</span></p>
    </div>


    <div style="width: 300px; margin-bottom: 15px;">
        <button
            style="width: 100%; height: 40px; background-color: #2563eb; color: white; border: none; border-radius: 999px;">Submit</button>
    </div>


    <div style="width: 300px; margin-bottom: 15px;">
        <button style="width: 100%; height: 40px; background-color: white; color: black; border: 1px solid gray; border-radius: 999px;">I already have an account</button>
    </div>


</body>

</html>
